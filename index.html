<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de piezas para redes</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding:30px 15px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#1a1a1a;
      border-radius:16px;
      padding:24px;
      box-shadow:0 0 24px rgba(255,204,0,.08);
    }

    h1{
      margin-top:0;
      color:#ffcc00;
      text-align:center;
    }

    .field{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
    }

    input[type="text"],
    textarea,
    input[type="file"]{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:8px;
      border:none;
      background:#2a2a2a;
      color:white;
      font-size:14px;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    button{
      background:#ffcc00;
      color:black;
      border:none;
      padding:12px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#e6b800;
    }

    .preview{
      margin-top:10px;
      max-width:100%;
      border-radius:10px;
      display:none;
    }

    .results{
      margin-top:24px;
      display:grid;
      gap:20px;
    }

    .card{
      background:#222;
      padding:14px;
      border-radius:12px;
    }

    .card h3{
      margin-top:0;
      color:#ffcc00;
    }

    .result-img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .loader{
      display:none;
      margin-top:16px;
      text-align:center;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Generador de piezas con IA</h1>

    <div class="field">
      <label for="referenceImage">Cargue una imagen de ejemplo</label>
      <input type="file" id="referenceImage" accept="image/*" />
      <img id="previewReference" class="preview" />
    </div>

    <div class="field">
      <label for="sourceImage">Cargue la imagen que quiere usar en la pieza</label>
      <input type="file" id="sourceImage" accept="image/*" />
      <img id="previewSource" class="preview" />
    </div>

    <div class="field">
      <label for="title">Título principal</label>
      <input
        type="text"
        id="title"
        placeholder="Escriba el título de su imagen aquí..."
      />
    </div>

    <div class="field">
      <label for="contact">Información de contacto</label>
      <textarea
        id="contact"
        placeholder="Agregue la información de contacto aquí..."
      ></textarea>
    </div>

    <div class="field">
      <label for="extra">Indicaciones extra</label>
      <textarea
        id="extra"
        placeholder="Ejemplo: estilo elegante, moderno, con colores de marca, mantener el producto de la imagen, composición publicitaria..."
      ></textarea>
    </div>

    <div class="buttons">
      <button onclick="generateImages()">Generar ambas piezas</button>
    </div>

    <div class="loader" id="loader">Generando imágenes...</div>

    <div class="results" id="results" style="display:none;">
      <div class="card">
        <h3>Feed</h3>
<p style="opacity:0.6; margin-top:-5px;">(1080 x 1350)</p>
        <img id="imgPost" class="result-img" />
      </div>

      <div class="card">
        <h3>Historia</h3>
<p style="opacity:0.6; margin-top:-5px;">(1080 x 1920)</p>
        <img id="imgStory" class="result-img" />
      </div>
    </div>
  </div>

  <script>
    const referenceInput = document.getElementById("referenceImage");
    const sourceInput = document.getElementById("sourceImage");

    const previewReference = document.getElementById("previewReference");
    const previewSource = document.getElementById("previewSource");

    let referenceImageBase64 = "";
    let sourceImageBase64 = "";

function compressImage(file, callback) {
  const img = new Image();
  const reader = new FileReader();

  reader.onload = e => {
    img.src = e.target.result;
  };

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const maxWidth = 600;

    const scale = maxWidth / img.width;
    canvas.width = maxWidth;
    canvas.height = img.height * scale;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const compressed = canvas.toDataURL("image/jpeg", 0.7);
    callback(compressed);
  };

  reader.readAsDataURL(file);
}

{
      const reader = new FileReader();
      reader.onload = (e) => callback(e.target.result);
      reader.readAsDataURL(file);
    }

    referenceInput.addEventListener("change", () => {
      const file = referenceInput.files[0];
      if (!file) return;

compressImage(file, (base64) => {
  referenceImageBase64 = base64;
        previewReference.src = base64;
        previewReference.style.display = "block";
      });
    });

    sourceInput.addEventListener("change", () => {
      const file = sourceInput.files[0];
      if (!file) return;

compressImage(file, (base64) => {
  sourceImageBase64 = base64;
        previewSource.src = base64;
        previewSource.style.display = "block";
      });
    });

    async function generateImages() {
      const title = document.getElementById("title").value.trim();
      const contact = document.getElementById("contact").value.trim();
      const extra = document.getElementById("extra").value.trim();

      const loader = document.getElementById("loader");
      const results = document.getElementById("results");
      const imgPost = document.getElementById("imgPost");
      const imgStory = document.getElementById("imgStory");

      if (!referenceImageBase64) {
        alert("Cargá una imagen de referencia.");
        return;
      }

      if (!sourceImageBase64) {
        alert("Cargá la imagen que querés utilizar en la pieza.");
        return;
      }

      if (!title) {
        alert("Escribí un título.");
        return;
      }

      loader.style.display = "block";
      results.style.display = "none";

      try {
        const response = await fetch("/api/generar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            referenceImageBase64,
            sourceImageBase64,
            title,
            contact,
            extra
          })
        });

        const rawText = await response.text();
        console.log("RESPUESTA CRUDA:", rawText);

        let data;
        try {
          data = JSON.parse(rawText);
        } catch (e) {
          throw new Error("El backend no devolvió JSON válido: " + rawText);
        }

        if (!response.ok) {
          throw new Error(data.error || "Error al generar imágenes");
        }

        imgPost.src = data.post;
        imgStory.src = data.story;
        results.style.display = "grid";
      } catch (error) {
        console.error(error);
        alert(error.message || "No se pudo generar");
      } finally {
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
