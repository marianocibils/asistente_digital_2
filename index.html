<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de piezas para redes</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding:30px 15px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#1a1a1a;
      border-radius:16px;
      padding:24px;
      box-shadow:0 0 24px rgba(255,204,0,.08);
    }

    h1{
      margin-top:0;
      color:#ffcc00;
      text-align:center;
    }

    .field{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
    }

    input[type="text"],
    textarea,
    input[type="file"]{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:8px;
      border:none;
      background:#2a2a2a;
      color:white;
      font-size:14px;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    button{
      background:#ffcc00;
      color:black;
      border:none;
      padding:12px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#e6b800;
    }

    .preview{
      margin-top:10px;
      max-width:100%;
      border-radius:10px;
      display:none;
    }

    .results{
      margin-top:24px;
      display:grid;
      gap:20px;
    }

    .card{
      background:#222;
      padding:14px;
      border-radius:12px;
    }

    .card h3{
      margin-top:0;
      color:#ffcc00;
    }

    .result-img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .loader{
      display:none;
      margin-top:16px;
      text-align:center;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Generador de piezas con IA</h1>

    <div class="field">
      <label for="referenceImage">Cargue una imagen de ejemplo</label>
      <input type="file" id="referenceImage" accept="image/*" />
      <img id="previewReference" class="preview" />
    </div>

    <div class="field">
      <label for="sourceImage">Cargue la imagen que quiere usar en la pieza</label>
      <input type="file" id="sourceImage" accept="image/*" />
      <img id="previewSource" class="preview" />
    </div>

    <div class="field">
      <label for="title">Título principal</label>
      <input
        type="text"
        id="title"
        placeholder="Escriba el título de su imagen aquí..."
      />
    </div>

    <div class="field">
      <label for="contact">Información de contacto</label>
      <textarea
        id="contact"
        placeholder="Agregue la información de contacto aquí..."
      ></textarea>
    </div>

    <div class="field">
      <label for="extra">Indicaciones extra</label>
      <textarea
        id="extra"
        placeholder="Ejemplo: estilo elegante, moderno, con colores de marca, mantener el producto de la imagen, composición publicitaria..."
      ></textarea>
    </div>

    <div class="buttons">
      <button onclick="generateImages()">Generar ambas piezas</button>
    </div>

    <div class="loader" id="loader">Generando imágenes...</div>

    <div class="results" id="results" style="display:none;">
      <div class="card">
        <h3>Feed</h3>
<p style="opacity:0.6; margin-top:-5px;">(1024 x 1536)</p>
        <img id="imgPost" class="result-img" />
      </div>

      <div class="card">
        <h3>Historia</h3>
<p style="opacity:0.6; margin-top:-5px;">(1024 x 1536)</p>
        <img id="imgStory" class="result-img" />
      </div>
    </div>
  </div>

  <script>
    const referenceInput = document.getElementById("referenceImage");
    const sourceInput = document.getElementById("sourceImage");

    const previewReference = document.getElementById("previewReference");
    const previewSource = document.getElementById("previewSource");

    let referenceImageBase64 = "";
    let sourceImageBase64 = "";

function compressImage(file, callback) {
  const img = new Image();
  const reader = new FileReader();

  reader.onload = e => {
    img.src = e.target.result;
  };

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const maxWidth = 600;

    const scale = maxWidth / img.width;
    canvas.width = maxWidth;
    canvas.height = img.height * scale;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const compressed = canvas.toDataURL("image/jpeg", 0.7);
    callback(compressed);
  };

  reader.readAsDataURL(file);
}

    referenceInput.addEventListener("change", () => {
      const file = referenceInput.files[0];
      if (!file) return;

compressImage(file, (base64) => {
  referenceImageBase64 = base64;
        previewReference.src = base64;
        previewReference.style.display = "block";
      });
    });

    sourceInput.addEventListener("change", () => {
      const file = sourceInput.files[0];
      if (!file) return;

compressImage(file, (base64) => {
  sourceImageBase64 = base64;
        previewSource.src = base64;
        previewSource.style.display = "block";
      });
    });

   async function generateImages() {
  const title = document.getElementById("title").value;
  const contact = document.getElementById("contact").value;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1080;
  canvas.height = 1350;

  const bg = new Image();
  bg.src = sourceImageBase64;

  bg.onload = () => {
    // 1. FONDO
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

    // 2. OVERLAY AZUL (simula tu estética)
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "rgba(0,50,120,0.6)");
    gradient.addColorStop(1, "rgba(0,20,60,0.9)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 3. TITULO
    ctx.fillStyle = "white";
    ctx.font = "bold 80px Arial";
    ctx.fillText("Plan Joven", 60, 120);

    // 4. PRECIO (variable)
    ctx.font = "bold 60px Arial";
    ctx.fillText("Desde $55.000", 60, 200);

    // 5. TEXTO SECUNDARIO
    ctx.font = "40px Arial";
    ctx.fillText("Especialidades brindadas", 60, 270);
    ctx.fillText("por el Sanatorio Mayo", 60, 320);

    // 6. BLOQUE LOGOS (simulado)
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(200, 850, 680, 120);

    ctx.fillStyle = "white";
    ctx.font = "bold 40px Arial";
    ctx.fillText("NM   |   MAYO", 350, 920);

    // 7. CONTACTO
    ctx.font = "bold 60px Arial";
    ctx.fillText(contact || "3426-498512", 200, 1100);

    // RESULTADO
    const finalImage = canvas.toDataURL("image/png");

    document.getElementById("imgPost").src = finalImage;
    document.getElementById("results").style.display = "grid";
  };
}
  </script>
</body>
</html>
